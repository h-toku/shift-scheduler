# ローカル開発用 PostgreSQL（本番の認証情報はここに置かないこと）
services:
  postgres:
    image: postgres:16-alpine
    container_name: shift-scheduler-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_dev
      POSTGRES_DB: shift_scheduler
    volumes:
      - shift_scheduler_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d shift_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  shift_scheduler_pgdata:
